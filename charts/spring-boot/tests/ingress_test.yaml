suite: Ingress
templates:
  - ingress.yaml
release:
  name: t
  namespace: default
set:
  skipHelmVersionCheck: true
  image:
    repository: example/spring-boot
tests:
  - it: not rendered when ingress disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a v1 Ingress when enabled
    set:
      ingress:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: t-spring-boot

  - it: renders className, annotations, tls, and host paths
    set:
      ingress:
        enabled: true
        className: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
        hosts:
          - host: app.example.com
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: app-tls
            hosts:
              - app.example.com
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt
      - equal:
          path: spec.tls[0].secretName
          value: app-tls
      - equal:
          path: spec.tls[0].hosts[0]
          value: app.example.com
      - equal:
          path: spec.rules[0].host
          value: app.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: t-spring-boot
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 80

  - it: omits ingressClassName when className is empty
    set:
      ingress:
        enabled: true
        className: ""
    asserts:
      - notExists:
          path: spec.ingressClassName
