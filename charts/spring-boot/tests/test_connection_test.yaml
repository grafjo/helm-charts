suite: helm test-connection hook
templates:
  - tests/test-connection.yaml
release:
  name: t
  namespace: default
set:
  skipHelmVersionCheck: true
  image:
    repository: example/spring-boot
tests:
  - it: renders a Pod with the helm test hook annotation
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Pod
      - equal:
          path: metadata.name
          value: t-spring-boot-test-connection
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
      - equal:
          path: spec.restartPolicy
          value: Never

  - it: wget targets the chart Service on service.port
    asserts:
      - equal:
          path: spec.containers[0].name
          value: wget
      - equal:
          path: spec.containers[0].command
          value: [wget]
      - equal:
          path: spec.containers[0].args
          value: ["t-spring-boot:80"]

  - it: busybox image is pinned (not :latest)
    asserts:
      - matchRegex:
          path: spec.containers[0].image
          pattern: "^busybox:[^l]"
