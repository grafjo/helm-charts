suite: ServiceAccount
templates:
  - serviceaccount.yaml
release:
  name: t
  namespace: default
set:
  skipHelmVersionCheck: true
  image:
    repository: example/spring-boot
tests:
  - it: rendered by default with automount enabled
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: t-spring-boot
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: not rendered when serviceAccount.create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: automount=false propagates to the SA object
    set:
      serviceAccount:
        automount: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: annotations are passed through
    set:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123:role/spring-boot
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123:role/spring-boot

  - it: serviceAccount.name override wins
    set:
      serviceAccount:
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa
