suite: env secretKeyRef notation
templates:
  - deployment.yaml
release:
  name: t
  namespace: default
set:
  skipHelmVersionCheck: true
  image:
    repository: example/spring-boot
tests:
  - it: renders secretKeyRef with valueFrom
    set:
      env:
        SPRING_DATASOURCE_PASSWORD:
          secretKeyRef:
            name: postgres-creds
            key: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SPRING_DATASOURCE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-creds
                key: password

  - it: passes optional flag through
    set:
      env:
        SECRET_VAL:
          secretKeyRef:
            name: my-secret
            key: api-key
            optional: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_VAL
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: api-key
                optional: true
