# Default values for spring-boot.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Internal test escape hatch. Bypasses the Helm 4 capability guard so the
# helm-unittest harness (which embeds a Helm 3 engine) can render the chart.
# Do not set in production values.
skipHelmVersionCheck: false

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  # REQUIRED. No default — the chart renders nothing for a Spring Boot app
  # built from someone else's image. Set this to your application image
  # (e.g. "my-org/my-app" or "ghcr.io/my-org/my-app").
  # @schema required: true ; minLength: 1
  repository: ""
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  # Port the application inside the container listens on. The chart auto-sets
  # SERVER_PORT to this value (unless you supplied SERVER_PORT in env: below).
  containerPort: 8080

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - chart-example.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Liveness, readiness, and startup probes — Spring Boot's Kubernetes-aware
# probe endpoints (Boot >= 2.3): /actuator/health/liveness reflects pure JVM
# health (restart on failure); /actuator/health/readiness reflects whether the
# app can serve traffic (drains the pod from Service endpoints on failure).
# Port "http" is automatically rewritten to "http-management" when
# customizedManagementServer.enabled is true. Override port explicitly to opt out.
# initialDelaySeconds is 0 on liveness/readiness because the startupProbe
# already gates both — adding a second delay would just hide a ready pod.
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    # @schema type: [string, integer]
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 10
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    # @schema type: [string, integer]
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 10
startupProbe:
  httpGet:
    path: /actuator/health/readiness
    # @schema type: [string, integer]
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 30

# Pod termination grace period. Must fit the full shutdown budget:
#   lifecycle.preStop sleep + gracefulShutdown.timeout + JVM exit slack
# See the "Graceful Shutdown" section in the README.
terminationGracePeriodSeconds: 60

# Container lifecycle hooks. The default preStop sleep gives the cluster time
# to drain Service endpoints before SIGTERM reaches the app. Set to null to disable.
lifecycle:
  preStop:
    sleep:
      seconds: 10

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

topologySpreadConstraints: []

affinity: {}

# ── Spring-Boot-specific extensions ───────────────────────────────────────────

# Environment variables for the application container.
# Map keyed by env-var name. Each value is one of:
#   - scalar (string/int/bool/float) — shorthand for { value: <scalar> }, stringified+quoted
#   - { value: <scalar> }
#   - { secretKeyRef: { name, key, optional? } }
#   - { configMapKeyRef: { name, key, optional? } }
#   - { fieldRef: { fieldPath, apiVersion? } }
#   - { resourceFieldRef: { containerName?, resource, divisor? } }
#
# Note: $(VAR) interpolation is unreliable because entries render in alphabetical
# order. Inline literal values into dependent vars instead of relying on $(VAR).
env: {}

# Init containers (rendered via tpl).
extraInitContainers: ""

# Graceful shutdown env auto-injection. See the "Graceful Shutdown" section in
# the README. Each entry is auto-injected unless you supply your own key in env: above.
gracefulShutdown:
  # SERVER_SHUTDOWN — "graceful" lets in-flight requests finish on SIGTERM;
  # "immediate" terminates them. Requires Spring Boot ≥ 2.3 (older versions
  # silently ignore the property).
  mode: graceful
  # SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE — max time Spring Boot waits
  # for each shutdown phase. Must leave room within terminationGracePeriodSeconds
  # for the preStop sleep + JVM exit slack.
  timeout: 30s

# Customize the spring boot actuator management server settings.
# When enabled, Actuator is exposed on a second container/service port (port name:
# "http-management"). Default probes and the ServiceMonitor automatically follow
# this port when enabled — no manual override required.
customizedManagementServer:
  enabled: false
  port: 8090
  address: 0.0.0.0

# ServiceMonitor for the prometheus-operator.
serviceMonitor:
  enabled: false
  namespace: ""
  annotations: {}
  labels: {}
  interval: 30s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  # When empty, derived from customizedManagementServer.enabled:
  #   enabled  → "http-management"
  #   disabled → "http"
  # Set explicitly to override.
  port: ""

