{{- if .Values.serviceMonitor.enabled }}
{{- $ctx := . -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "spring-boot.fullname" . }}
  {{- with .Values.serviceMonitor.namespace }}
  namespace: {{ . }}
  {{- end }}
  {{- with .Values.serviceMonitor.annotations }}
  annotations:
    {{- range $key, $value := . }}
      {{- printf "%s: %s" $key (tpl $value $ctx | quote) | nindent 4 }}
      {{- end }}
  {{- end }}
  labels:
  {{- include "spring-boot.labels" . | nindent 4 }}
  {{- range $key, $value := .Values.serviceMonitor.labels }}
  {{- printf "%s: %s" $key (tpl $value $ctx | quote) | nindent 4 }}
  {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "spring-boot.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: {{ default (include "spring-boot.actuatorPortName" .) .Values.serviceMonitor.port }}
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end -}}
