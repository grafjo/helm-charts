name: Lint and Test Charts

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.0

      - name: Install helm plugins
        run: |
          set -euo pipefail
          if ! helm plugin list | grep -q '^unittest'; then
            helm plugin install https://github.com/helm-unittest/helm-unittest \
              --version v1.1.0 --verify=false
          fi
          if ! helm plugin list | grep -q '^schema'; then
            helm plugin install https://github.com/losisin/helm-values-schema-json.git \
              --version v2.3.1 --verify=false
          fi

      - name: Helm lint
        # image.repository is required (minLength: 1); pass a placeholder so
        # lint validates the template, not the empty default in values.yaml.
        run: helm lint charts/spring-boot --set image.repository=example/spring-boot

      - name: Helm unittest
        run: helm unittest charts/spring-boot

      - name: Validate values.schema.json is up to date
        run: |
          set -euo pipefail
          helm schema \
            --values charts/spring-boot/values.yaml \
            --output charts/spring-boot/values.schema.json \
            --draft 7 \
            --schema-root.additional-properties=false
          if ! git diff --exit-code -- charts/spring-boot/values.schema.json; then
            echo "::error::values.schema.json is out of date. Regenerate locally with:"
            echo "::error::  helm schema --values charts/spring-boot/values.yaml --output charts/spring-boot/values.schema.json --draft 7 --schema-root.additional-properties=false"
            exit 1
          fi
